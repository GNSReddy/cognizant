## Server port (changed to avoid conflicts with other running services)
server.port=8083

## Logging levels
## org.springframework – info level shows Spring framework startup messages
## com.cognizant.springlearn – debug level shows our custom debug logs
logging.level.org.springframework=info
logging.level.com.cognizant.springlearn=debug

## Custom log pattern showing: date|time|thread|level|logger|method|message
logging.pattern.console=%d{yyMMdd}|%d{HH:mm:ss.SSS}|%-20.20thread|%5p|%-25.25logger{25}|%25M|%m%n
