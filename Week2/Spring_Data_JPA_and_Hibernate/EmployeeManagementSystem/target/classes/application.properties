# Server Port
server.port=8080

# Primary Data Source (Employee & Department)
spring.datasource.primary.jdbc-url=jdbc:h2:mem:primarydb;DB_CLOSE_DELAY=-1
spring.datasource.primary.driver-class-name=org.h2.Driver
spring.datasource.primary.username=sa
spring.datasource.primary.password=password

# Secondary Data Source (Audit Logs)
spring.datasource.secondary.jdbc-url=jdbc:h2:mem:secondarydb;DB_CLOSE_DELAY=-1
spring.datasource.secondary.driver-class-name=org.h2.Driver
spring.datasource.secondary.username=sa
spring.datasource.secondary.password=password

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Hibernate & JPA Properties
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Exercise 10: Hibernate Batch Processing and Optimizations
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=true
